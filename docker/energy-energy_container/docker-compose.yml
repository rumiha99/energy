version: '3.3'

services:
  energy_container:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: 'shiitake'
    stdin_open: true
    tty: true
    volumes:
      - .:/home

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
              count: 1